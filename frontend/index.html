<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Responsive viewport — makes the site work properly on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tab title + favicon -->
    <title>JobHunt — Find Your Dream Career</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- SEO meta tags — helps Google understand what this page is about -->
    <meta name="description" content="JobHunt: The modern job portal connecting talent with opportunity. Find jobs, post openings, and hire top talent." />

    <!-- Google Fonts — Clash Display (headings) + Cabinet Grotesk (body) -->
    <!-- These are the custom fonts used in tailwind.config.js fontFamily -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=cabinet-grotesk@400,500,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React mounts here — see main.jsx -->
    <div id="root"></div>

    <!-- Vite entry point — loads main.jsx which bootstraps the React app -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
